services:
  frontend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
    container_name: bpmn-frontend
    ports:
      - "80:80"
      - "443:443"      # <-- NUEVO: Abrimos el puerto HTTPS
    volumes:           # <-- NUEVO: Le pasamos los certificados al contenedor
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
    networks:
      - bpmn-net

  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    container_name: bpmn-backend
    env_file:
      - .env
    volumes:
      - ../backend/secrets:/app/secrets
    environment:
      SPRING_DATA_MONGODB_URI: ${MONGODB_URI}
      APP_PUBLIC_BASE_URL: ${APP_PUBLIC_BASE_URL}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      SPRING_RABBITMQ_HOST: ${SPRING_RABBITMQ_HOST}
      SPRING_RABBITMQ_STOMP_PORT: ${SPRING_RABBITMQ_STOMP_PORT}
      SPRING_RABBITMQ_USERNAME: ${SPRING_RABBITMQ_USERNAME}
      SPRING_RABBITMQ_PASSWORD: ${SPRING_RABBITMQ_PASSWORD}
      WEBSOCKET_USE_RELAY: ${WEBSOCKET_USE_RELAY}
      AWS_REGION: ${AWS_REGION}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      MAX_UPLOAD_SIZE: ${MAX_UPLOAD_SIZE}
      MAX_REQUEST_SIZE: ${MAX_REQUEST_SIZE}
      AI_ENGINE_BASE_URL: ${AI_ENGINE_BASE_URL}
      JAVA_OPTS: ${JAVA_OPTS}
      FIREBASE_CREDENTIALS_PATH: /app/secrets/firebase-service-account.json

    ports:
      - "8080:8080"
    depends_on:
      bpmn-ai-engine:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - bpmn-net

  bpmn-ai-engine:
    build:
      context: ..
      dockerfile: bpmn-ai-engine/Dockerfile
    container_name: bpmn-ai-engine
    environment:
      AI_ENGINE_APP_NAME: ${AI_ENGINE_APP_NAME}
      AI_ENGINE_APP_VERSION: ${AI_ENGINE_APP_VERSION}
      AI_ENGINE_HOST: ${AI_ENGINE_HOST}
      AI_ENGINE_PORT: ${AI_ENGINE_PORT}
      AI_ENGINE_RELOAD: ${AI_ENGINE_RELOAD}
      AI_ENGINE_LOG_LEVEL: ${AI_ENGINE_LOG_LEVEL}
      AI_ENGINE_ALLOWED_ORIGINS: ${AI_ENGINE_ALLOWED_ORIGINS}
      AI_API_KEY: ${AI_API_KEY}
      AI_MODEL: ${AI_MODEL}
      AI_MODELS: ${AI_MODELS}
      AI_TIMEOUT_SECONDS: ${AI_TIMEOUT_SECONDS}
      AI_BASE_URL: ${AI_BASE_URL}
    ports:
      - "8010:8010"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8010/health', timeout=5)"]
      interval: ${AI_ENGINE_HEALTHCHECK_INTERVAL:-60s}
      timeout: ${AI_ENGINE_HEALTHCHECK_TIMEOUT:-5s}
      retries: ${AI_ENGINE_HEALTHCHECK_RETRIES:-3}
      start_period: ${AI_ENGINE_HEALTHCHECK_START_PERIOD:-25s}
    networks:
      - bpmn-net

  rabbitmq:
    image: rabbitmq:3-management
    container_name: bpmn-rabbitmq
    command: ["/bin/sh", "-c", "rabbitmq-plugins enable --offline rabbitmq_stomp && rabbitmq-server"]
    environment:
      RABBITMQ_DEFAULT_USER: ${SPRING_RABBITMQ_USERNAME}
      RABBITMQ_DEFAULT_PASS: ${SPRING_RABBITMQ_PASSWORD}
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - bpmn-net

networks:
  bpmn-net:
    driver: bridge
